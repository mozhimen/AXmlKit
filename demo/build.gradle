plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
}

android {
    namespace 'com.mozhimen.xmlk.demo'
    compileSdk 35

    defaultConfig {
        applicationId "com.mozhimen.xmlk.demo"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures {
        dataBinding true
    }
}

dependencies {
    implementation 'com.github.mozhimen.ASwiftKit:uik-databinding:2.1.6'
    implementation 'com.github.mozhimen.ASwiftKit:xmlk:2.1.6'
    implementation 'com.github.mozhimen.AAdaptKit:systembar:0.0.3'
    implementation project(':layoutk-blur')
    implementation project(':recyclerk-quick')
    implementation project(':vhk')

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}